<section class="reset-page">
  <div class="reset-card">
    <div class="reset-header">
      <div class="logo-box">📞</div>
      <h1>EmergAuto</h1>
      <p>Restablecer contraseña</p>
    </div>

    <div class="reset-body">
      <!-- Verificando token -->
      <div *ngIf="!verificado" class="loading">
        <div class="spinner"></div>
        <p>Verificando enlace...</p>
      </div>

      <!-- Token inválido -->
      <div *ngIf="verificado && !tokenValido" class="error-box">
        <div class="error-icon">⚠️</div>
        <h2>Enlace inválido</h2>
        <p>{{ error }}</p>
        <a routerLink="/login" class="btn-volver">Volver al inicio</a>
      </div>

      <!-- Token válido -->
      <div *ngIf="verificado && tokenValido" class="form-box">
        <p>Ingresa tu nueva contraseña</p>

        <div class="form-group">
          <label>Nueva contraseña</label>
          <input 
            type="password"
            class="form-input"
            placeholder="••••••••"
            [(ngModel)]="nuevaPassword"
            [disabled]="cargando">
          <small>Mínimo 6 caracteres</small>
        </div>

        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input 
            type="password"
            class="form-input"
            placeholder="••••••••"
            [(ngModel)]="confirmarPassword"
            [disabled]="cargando">
        </div>

        <button class="btn-reset" (click)="resetearPassword()" [disabled]="cargando">
          {{ cargando ? 'Actualizando...' : 'Restablecer contraseña' }}
        </button>

        <a routerLink="/login" class="link-login">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>
</section>
